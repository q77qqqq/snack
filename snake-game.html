<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="贪吃蛇">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>🐍 贪吃蛇</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ===== 页面容器 ===== */
        .page {
            width: 100%;
            max-width: 420px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        /* ===== 开始页面 ===== */
        .home-page {
            gap: 20px;
        }

        .logo-area {
            text-align: center;
        }

        .logo-emoji {
            font-size: 72px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .game-title {
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            margin-top: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(99,102,241,0.5);
        }

        .game-subtitle {
            color: #8888aa;
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 2px;
        }

        /* 模式选择卡片 */
        .mode-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-label {
            color: #8888aa;
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            text-transform: uppercase;
        }

        .mode-card {
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mode-card:active {
            transform: scale(0.97);
        }

        .mode-card.easy-card { border-color: rgba(34,197,94,0.3); }
        .mode-card.easy-card:hover, .mode-card.easy-card:active {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.6);
            box-shadow: 0 0 25px rgba(34,197,94,0.15);
        }

        .mode-card.medium-card { border-color: rgba(245,158,11,0.3); }
        .mode-card.medium-card:hover, .mode-card.medium-card:active {
            background: rgba(245,158,11,0.12);
            border-color: rgba(245,158,11,0.6);
            box-shadow: 0 0 25px rgba(245,158,11,0.15);
        }

        .mode-card.hard-card { border-color: rgba(239,68,68,0.3); }
        .mode-card.hard-card:hover, .mode-card.hard-card:active {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.6);
            box-shadow: 0 0 25px rgba(239,68,68,0.15);
        }

        .mode-icon {
            font-size: 36px;
            width: 50px;
            text-align: center;
            flex-shrink: 0;
        }

        .mode-info {
            flex: 1;
        }

        .mode-name {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        .mode-detail {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        .mode-target {
            font-size: 14px;
            font-weight: 600;
            color: #a0a0b8;
            flex-shrink: 0;
            text-align: right;
        }

        .mode-target span {
            display: block;
            font-size: 11px;
            color: #666;
        }

        /* 按钮 */
        .home-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .home-btn:active { transform: scale(0.96); }

        .btn-leaderboard {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            border: 2px solid rgba(255,215,0,0.25);
        }

        .btn-leaderboard:active {
            background: rgba(255,215,0,0.18);
        }

        /* ===== 游戏页面 ===== */
        .game-page {
            gap: 10px;
        }

        .game-page.hidden { display: none !important; }

        /* ===== 难度指示器（游戏中） ===== */
        .diff-indicator {
            width: 100%;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
        }
        .diff-indicator.easy { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .diff-indicator.medium { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .diff-indicator.hard { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        /* ===== 头部信息 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 8px;
        }

        .info-box {
            background: rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 8px 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            flex: 1;
        }

        .info-label {
            color: #a0a0b8;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-value {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }

        .info-box.target {
            border-color: rgba(99,102,241,0.4);
            background: rgba(99,102,241,0.1);
        }
        .info-box.target .info-label { color: #a5b4fc; }
        .info-box.target .info-value { color: #c7d2fe; }

        .info-box.best {
            border-color: rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.08);
        }
        .info-box.best .info-label { color: #ccb860; }
        .info-box.best .info-value { color: #ffd700; }

        /* ===== 进度条 ===== */
        .progress-wrap {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
        }

        /* ===== 画布 ===== */
        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.05);
            background: #1a1a2e;
            touch-action: none;
        }

        /* ===== 方向键 ===== */
        .controls {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            grid-template-areas:
                ". up ."
                "left down right";
            padding: 0 20px;
        }

        .ctrl-btn {
            width: 100%;
            aspect-ratio: 1;
            max-width: 80px;
            justify-self: center;
            border: none;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:active {
            background: rgba(99, 102, 241, 0.5);
            transform: scale(0.9);
            border-color: rgba(99, 102, 241, 0.6);
        }

        .btn-up { grid-area: up; }
        .btn-down { grid-area: down; }
        .btn-left { grid-area: left; }
        .btn-right { grid-area: right; }

        /* ===== 底部按钮 ===== */
        .bottom-btns {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        .btn-restart:active { transform: scale(0.95); }

        .btn-pause {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-back {
            background: rgba(255,255,255,0.06);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-pause:active { background: rgba(255,255,255,0.15); }
        .btn-back:active { background: rgba(255,255,255,0.1); }

        .tip {
            color: #6b6b80;
            font-size: 11px;
            text-align: center;
        }

        /* ===== 弹窗 ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .overlay-content {
            background: linear-gradient(145deg, #1e1e3a, #2a2a4a);
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            max-width: 340px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .overlay-content h2 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 6px;
        }

        .overlay-content .final-score {
            color: #ffd700;
            font-size: 52px;
            font-weight: 800;
            margin: 8px 0;
        }

        .overlay-content .sub-text {
            color: #a0a0b8;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .overlay-btns .action-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
        }

        .hidden { display: none !important; }

        /* ===== 排行榜 ===== */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }

        .leaderboard-table th {
            color: #a0a0b8;
            font-weight: 500;
            padding: 8px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            letter-spacing: 1px;
        }

        .leaderboard-table td {
            color: #ddd;
            padding: 8px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .leaderboard-table .rank-1 { color: #ffd700; font-weight: 700; }
        .leaderboard-table .rank-2 { color: #c0c0c0; font-weight: 700; }
        .leaderboard-table .rank-3 { color: #cd7f32; font-weight: 700; }

        .diff-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .diff-tag.easy { background: rgba(34,197,94,0.2); color: #4ade80; }
        .diff-tag.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .diff-tag.hard { background: rgba(239,68,68,0.2); color: #f87171; }

        .clear-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #888;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }

        .clear-btn:active { background: rgba(255,255,255,0.05); }

        .no-records {
            color: #666;
            padding: 20px;
            font-size: 14px;
        }

        /* 通关特效 */
        .win-glow {
            animation: glowPulse 0.6s ease-in-out 3;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 20px 60px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 0 60px rgba(255,215,0,0.8), 0 20px 60px rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <!-- ============ 开始页面 ============ -->
    <div class="page home-page" id="homePage">
        <div class="logo-area">
            <div class="logo-emoji">🐍</div>
            <div class="game-title">贪 吃 蛇</div>
            <div class="game-subtitle">SNAKE GAME</div>
        </div>

        <div class="mode-section">
            <div class="section-label">🎯 选择难度模式</div>

            <!-- 简单模式 -->
            <div class="mode-card easy-card" data-diff="easy">
                <div class="mode-icon">🟢</div>
                <div class="mode-info">
                    <div class="mode-name">简单模式</div>
                    <div class="mode-detail">速度较慢，适合新手</div>
                </div>
                <div class="mode-target">
                    100<span>通关目标</span>
                </div>
            </div>

            <!-- 中等模式 -->
            <div class="mode-card medium-card" data-diff="medium">
                <div class="mode-icon">🟡</div>
                <div class="mode-info">
                    <div class="mode-name">中等模式</div>
                    <div class="mode-detail">速度适中，稍有挑战</div>
                </div>
                <div class="mode-target">
                    200<span>通关目标</span>
                </div>
            </div>

            <!-- 困难模式 -->
            <div class="mode-card hard-card" data-diff="hard">
                <div class="mode-icon">🔴</div>
                <div class="mode-info">
                    <div class="mode-name">困难模式</div>
                    <div class="mode-detail">速度极快，高手挑战</div>
                </div>
                <div class="mode-target">
                    300<span>通关目标</span>
                </div>
            </div>
        </div>

        <!-- 排行榜按钮 -->
        <div style="display:flex;gap:10px;width:100%;max-width:320px;">
            <button class="home-btn btn-leaderboard" id="btnHomeLeaderboard" style="flex:1;">
                🏆 查看排行榜
            </button>
            <button class="home-btn btn-music-home" id="btnHomeMusic" style="flex:1;background:rgba(255,255,255,0.06);">
                🔊 音乐
            </button>
        </div>

        <div class="tip">💡 每吃一个果实 = 1 分 | 达到目标分数即通关</div>
    </div>

    <!-- ============ 游戏页面 ============ -->
    <div class="page game-page hidden" id="gamePage">

        <!-- 难度指示器 -->
        <div class="diff-indicator" id="diffIndicator">🟡 中等模式</div>

        <!-- 头部：得分 / 目标 / 最佳 -->
        <div class="header">
            <div class="info-box">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box target">
                <div class="info-label">目标</div>
                <div class="info-value" id="targetScore">200</div>
            </div>
            <div class="info-box best">
                <div class="info-label">最佳</div>
                <div class="info-value" id="bestScore">0</div>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-wrap">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <!-- 画布 -->
        <canvas id="gameCanvas"></canvas>

        <!-- 方向键 -->
        <div class="controls">
            <button class="ctrl-btn btn-up" id="btnUp">▲</button>
            <button class="ctrl-btn btn-left" id="btnLeft">◀</button>
            <button class="ctrl-btn btn-down" id="btnDown">▼</button>
            <button class="ctrl-btn btn-right" id="btnRight">▶</button>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-btns">
            <button class="action-btn btn-pause" id="btnPause">⏯ 暂停</button>
            <button class="action-btn btn-music" id="btnMusic">🔊 音乐</button>
            <button class="action-btn btn-restart" id="btnRestart">🔄 重新开始</button>
            <button class="action-btn btn-back" id="btnBack">🏠 返回首页</button>
        </div>

        <div class="tip">💡 也可以用手指滑动屏幕控制方向 | 空格键暂停</div>
    </div>

    <!-- ============ 游戏结束/通关弹窗 ============ -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content" id="gameOverContent">
            <h2 id="overlayTitle">游戏结束</h2>
            <div class="final-score" id="finalScore">0</div>
            <p class="sub-text" id="overlayMsg">再来一局吧！</p>
            <div class="overlay-btns">
                <button class="action-btn btn-restart" id="btnOverlayRestart">🔄 再来一局</button>
                <button class="action-btn btn-leaderboard" id="btnOverlayLeaderboard">🏆 查看排行榜</button>
                <button class="action-btn btn-back" id="btnOverlayBack">🏠 返回首页</button>
            </div>
        </div>
    </div>

    <!-- ============ 排行榜弹窗 ============ -->
    <div class="overlay hidden" id="leaderboardOverlay">
        <div class="overlay-content">
            <h2>🏆 排行榜</h2>
            <div id="leaderboardBody"></div>
            <button class="clear-btn" id="btnClearLeaderboard">清空记录</button>
            <br>
            <button class="action-btn btn-restart" id="btnCloseLeaderboard" style="margin-top:10px;width:100%">关闭</button>
        </div>
    </div>

    <script>
        // ============ 难度配置 ============
        const DIFFICULTY = {
            easy:   { speed: 160, target: 100, name: '简单', emoji: '🟢' },
            medium: { speed: 100, target: 200, name: '中等', emoji: '🟡' },
            hard:   { speed: 60,  target: 300, name: '困难', emoji: '🔴' },
        };

        let currentDifficulty = 'medium';
        let GAME_SPEED = DIFFICULTY.medium.speed;
        let TARGET_SCORE = DIFFICULTY.medium.target;

        // ============ 游戏配置 ============
        const GRID_SIZE = 20;
        let CELL_SIZE;

        // ============ DOM元素 ============
        const homePage = document.getElementById('homePage');
        const gamePage = document.getElementById('gamePage');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const targetScoreEl = document.getElementById('targetScore');
        const progressFill = document.getElementById('progressFill');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const overlayMsg = document.getElementById('overlayMsg');
        const overlayTitle = document.getElementById('overlayTitle');
        const leaderboardOverlay = document.getElementById('leaderboardOverlay');
        const leaderboardBody = document.getElementById('leaderboardBody');
        const diffIndicator = document.getElementById('diffIndicator');

        // ============ 游戏状态 ============
        let snake = [];
        let food = null;
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoopId = null;
        let particles = [];
        let trailPositions = [];
        let gameWon = false;

        // ============ 排行榜数据 ============
        let leaderboard = [];
        function loadLeaderboard() {
            try {
                const data = localStorage.getItem('snakeLeaderboard');
                leaderboard = data ? JSON.parse(data) : [];
            } catch(e) { leaderboard = []; }
        }
        function saveLeaderboard() {
            try { localStorage.setItem('snakeLeaderboard', JSON.stringify(leaderboard)); } catch(e) {}
        }

        function getGlobalBest() {
            if (leaderboard.length === 0) return 0;
            return Math.max(...leaderboard.map(r => r.score));
        }

        loadLeaderboard();

        // ============ 初始化画布 ============
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 24, 380);
            canvas.width = maxWidth;
            canvas.height = maxWidth;
            CELL_SIZE = maxWidth / GRID_SIZE;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) draw();
        });

        function updateBestDisplay() {
            bestScoreEl.textContent = getGlobalBest();
        }
        updateBestDisplay();

        // ============ 音效 ============
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playBeep(freq, duration, type = 'square', vol = 0.08) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function sfxEat() { playBeep(600, 0.1, 'square', 0.08); setTimeout(() => playBeep(800, 0.1, 'square', 0.06), 60); }
        function sfxDie() { playBeep(150, 0.2, 'sawtooth', 0.1); setTimeout(() => playBeep(100, 0.3, 'sawtooth', 0.08), 120); }
        function sfxWin() {
            playBeep(523, 0.12, 'square', 0.08);
            setTimeout(() => playBeep(659, 0.12, 'square', 0.08), 120);
            setTimeout(() => playBeep(784, 0.12, 'square', 0.08), 240);
            setTimeout(() => playBeep(1047, 0.25, 'square', 0.1), 360);
        }
        function sfxTurn() { playBeep(300, 0.05, 'sine', 0.04); }

        // ============ 背景音乐系统 (8-bit 风格) ============
        let musicEnabled = true;
        let musicOscillators = [];
        let musicGains = [];
        let musicTimeoutIds = [];
        let musicBpm = 140; // BPM

        function stopAllMusic() {
            musicTimeoutIds.forEach(id => clearTimeout(id));
            musicTimeoutIds = [];
            musicOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
            musicOscillators = [];
            musicGains.forEach(gain => { try { gain.disconnect(); } catch(e) {} });
            musicGains = [];
        }

        // 8-bit 贪吃蛇背景音乐 - 循环播放
        function playNote(freq, startTime, duration, vol = 0.06) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(vol, startTime);
                gain.gain.setValueAtTime(vol * 0.6, startTime + duration * 0.7);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration + 0.01);
                musicOscillators.push(osc);
                musicGains.push(gain);
            } catch(e) {}
        }

        // 旋律1: 轻松愉快的主旋律 (16小节)
        // 旋律2: 紧张刺激的变奏 (16小节)
        const melody1 = [
            // [频率, 时长(拍)]
            [523, 0.5], [659, 0.5], [784, 0.5], [659, 0.5], // C E G E
            [784, 0.5], [880, 0.5], [1047, 0.5], [880, 0.5], // G A C A
            [1047, 0.5], [784, 0.5], [659, 0.5], [523, 0.5], // C G E C
            [587, 0.5], [698, 0.5], [784, 1.0],              // D F G
            [523, 0.5], [659, 0.5], [784, 0.5], [1047, 0.5], // C E G C
            [1175, 0.5], [1047, 0.5], [880, 0.5], [784, 0.5],// D C A G
            [659, 0.5], [784, 0.5], [880, 0.5], [659, 0.5],  // E G A E
            [523, 0.5], [587, 0.5], [659, 1.0],              // C D E
        ];

        const melody2 = [
            [1047, 0.5], [1175, 0.5], [1319, 0.5], [1175, 0.5],
            [1047, 0.5], [880, 0.5], [784, 0.5], [659, 0.5],
            [784, 0.25], [880, 0.25], [784, 0.25], [659, 0.25], [523, 0.5], [440, 0.5],
            [523, 0.5], [659, 0.5], [784, 0.5], [659, 0.5],
            [880, 0.5], [1047, 0.5], [1175, 0.5], [1319, 0.5],
            [1568, 0.5], [1319, 0.5], [1047, 0.5], [784, 0.5],
            [659, 0.25], [784, 0.25], [659, 0.25], [523, 0.25], [440, 0.5], [392, 0.5],
            [523, 1.0],
        ];

        // 低音贝斯线
        const bassLine = [
            [131, 1], [165, 1], [196, 1], [165, 1],
            [196, 1], [220, 1], [262, 1], [220, 1],
            [262, 1], [196, 1], [165, 1], [131, 1],
            [147, 1], [175, 1], [196, 1], [165, 0.5], [196, 0.5],
        ];

        // 鼓点 (用短噪声模拟)
        function playDrumBeat(startTime) {
            try {
                const ctx = getAudioCtx();
                const bufferSize = ctx.sampleRate * 0.05;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 4);
                }
                const source = ctx.createBufferSource();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(200, startTime);
                source.buffer = buffer;
                gain.gain.setValueAtTime(0.06, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(startTime);
                source.stop(startTime + 0.06);
                musicOscillators.push(source);
                musicGains.push(gain, filter);
            } catch(e) {}
        }

        function playMusicLoop() {
            if (!musicEnabled || gamePaused) return;
            stopAllMusic();
            const ctx = getAudioCtx();
            const now = ctx.currentTime;
            const beatDuration = 60 / musicBpm;
            const totalBeats = Math.max(melody1.length + 1, bassLine.length);
            const loopDuration = totalBeats * beatDuration;

            // 播放旋律
            melody1.forEach(([freq, beats], i) => {
                const startTime = now + melody1.slice(0, i).reduce((sum, m) => sum + m[1], 0) * beatDuration;
                playNote(freq, startTime, beats * beatDuration * 0.8, 0.05);
            });

            // 播放贝斯
            bassLine.forEach(([freq, beats], i) => {
                const startTime = now + bassLine.slice(0, i).reduce((sum, b) => sum + b[1], 0) * beatDuration;
                playNote(freq, startTime, beats * beatDuration * 0.9, 0.04);
            });

            // 播放鼓点 (每拍)
            for (let i = 0; i < totalBeats; i++) {
                const drumTime = now + i * beatDuration;
                playDrumBeat(drumTime);
                // 第2、4拍加军鼓感觉
                if (i % 2 === 1) {
                    const drumTime2 = drumTime + beatDuration * 0.25;
                    playDrumBeat(drumTime2);
                }
            }

            // 循环
            const loopId = setTimeout(() => {
                playMusicLoop();
            }, loopDuration * 1000);
            musicTimeoutIds.push(loopId);
        }

        function startMusic() {
            if (!musicEnabled) return;
            stopAllMusic();
            playMusicLoop();
        }

        function stopMusic() {
            stopAllMusic();
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const label = musicEnabled ? '🔊 音乐' : '🔇 音乐';
            const btn = document.getElementById('btnMusic');
            if (btn) btn.textContent = label;
            const btnHome = document.getElementById('btnHomeMusic');
            if (btnHome) btnHome.textContent = label;
            if (musicEnabled && gameRunning && !gamePaused) {
                startMusic();
            } else {
                stopMusic();
            }
            try { localStorage.setItem('snakeMusicEnabled', musicEnabled ? '1' : '0'); } catch(e) {}
        }

        // 加载音乐设置
        try {
            const saved = localStorage.getItem('snakeMusicEnabled');
            if (saved === '0') musicEnabled = false;
        } catch(e) {}

        // ============ 粒子系统 ============
        function spawnParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * CELL_SIZE + CELL_SIZE / 2,
                    y: y * CELL_SIZE + CELL_SIZE / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    decay: 0.03 + Math.random() * 0.04,
                    color: color,
                    size: 2 + Math.random() * 4
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ============ 食物生成 ============
        function generateFood() {
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            const allPositions = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    if (!snakeSet.has(`${x},${y}`)) {
                        allPositions.push({ x, y });
                    }
                }
            }
            if (allPositions.length === 0) return null;
            return allPositions[Math.floor(Math.random() * allPositions.length)];
        }

        // ============ 页面切换 ============
        function showHomePage() {
            // 停止游戏循环
            if (gameLoopId) clearInterval(gameLoopId);
            gameRunning = false;
            gamePaused = false;

            gamePage.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            leaderboardOverlay.classList.add('hidden');
            homePage.classList.remove('hidden');
            updateBestDisplay();
        }

        function startGame(diff) {
            currentDifficulty = diff;
            GAME_SPEED = DIFFICULTY[diff].speed;
            TARGET_SCORE = DIFFICULTY[diff].target;
            targetScoreEl.textContent = TARGET_SCORE;

            // 更新难度指示器
            diffIndicator.textContent = `${DIFFICULTY[diff].emoji} ${DIFFICULTY[diff].name}模式`;
            diffIndicator.className = 'diff-indicator ' + diff;

            // 切换页面
            homePage.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            leaderboardOverlay.classList.add('hidden');
            gamePage.classList.remove('hidden');

            initGame();
            draw();
            gameLoopId = setInterval(gameStep, GAME_SPEED);
            startMusic(); // 启动背景音乐
        }

        // ============ 游戏逻辑 ============
        function initGame() {
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY },
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameWon = false;
            particles = [];
            trailPositions = [];
            scoreEl.textContent = '0';
            progressFill.style.width = '0%';
            food = generateFood();
            gameRunning = true;
            gamePaused = false;
            gameOverOverlay.classList.add('hidden');
            leaderboardOverlay.classList.add('hidden');
            document.getElementById('btnPause').textContent = '⏯ 暂停';
            canvas.classList.remove('win-glow');
        }

        function gameStep() {
            if (!gameRunning || gamePaused) return;

            direction = { ...nextDirection };

            const head = snake[0];
            const newHead = { x: head.x + direction.x, y: head.y + direction.y };

            // 碰墙检测
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // 碰自己检测
            for (const seg of snake) {
                if (seg.x === newHead.x && seg.y === newHead.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(newHead);

            // 吃食物 — 每次+1分
            if (food && newHead.x === food.x && newHead.y === food.y) {
                score += 1;
                scoreEl.textContent = score;
                progressFill.style.width = Math.min(100, (score / TARGET_SCORE) * 100) + '%';
                sfxEat();
                spawnParticles(food.x, food.y, '#ff6b6b');

                // 检查是否通关
                if (score >= TARGET_SCORE) {
                    gameWin();
                    return;
                }

                food = generateFood();
                if (!food) {
                    gameWin();
                    return;
                }
            } else {
                snake.pop();
            }

            trailPositions.push({ ...snake[0] });
            if (trailPositions.length > 8) trailPositions.shift();

            updateParticles();
            draw();
        }

        function addToLeaderboard(finalScore, diff, won) {
            const record = {
                score: finalScore,
                difficulty: diff,
                difficultyName: DIFFICULTY[diff].name,
                won: won,
                date: new Date().toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
            };
            leaderboard.push(record);
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > 10) {
                leaderboard = leaderboard.slice(0, 10);
            }
            saveLeaderboard();
            updateBestDisplay();
        }

        function gameOver() {
            gameRunning = false;
            stopMusic(); // 停止背景音乐
            sfxDie();
            spawnParticles(snake[0].x, snake[0].y, '#ff4444', 20);

            addToLeaderboard(score, currentDifficulty, false);

            overlayTitle.textContent = '游戏结束';
            finalScoreEl.textContent = score;

            if (score >= TARGET_SCORE - 5) {
                overlayMsg.textContent = '差一点就通关了！加油！💪';
            } else if (score >= TARGET_SCORE / 2) {
                overlayMsg.textContent = '不错哦，继续努力！👍';
            } else {
                overlayMsg.textContent = '再来一局吧！';
            }
            gameOverOverlay.classList.remove('hidden');
            draw();
        }

        function gameWin() {
            gameRunning = false;
            gameWon = true;
            stopMusic(); // 停止背景音乐
            sfxWin();
            for (let i = 0; i < 30; i++) {
                const rx = Math.floor(Math.random() * GRID_SIZE);
                const ry = Math.floor(Math.random() * GRID_SIZE);
                const colors = ['#ffd700','#ff6b6b','#51cf66','#6366f1','#fbbf24'];
                spawnParticles(rx, ry, colors[Math.floor(Math.random()*colors.length)], 5);
            }

            addToLeaderboard(score, currentDifficulty, true);

            overlayTitle.textContent = '🎉 恭喜通关！';
            finalScoreEl.textContent = score;
            overlayMsg.textContent = `难度：${DIFFICULTY[currentDifficulty].emoji} ${DIFFICULTY[currentDifficulty].name} — 太厉害了！`;
            gameOverOverlay.classList.remove('hidden');
            canvas.classList.add('win-glow');

            if (getGlobalBest() <= score) {
                try { localStorage.setItem('snakeBestScore', score); } catch(e) {}
            }
            updateBestDisplay();
            draw();
        }

        function restartGame() {
            if (gameLoopId) clearInterval(gameLoopId);
            initGame();
            draw();
            gameLoopId = setInterval(gameStep, GAME_SPEED);
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('btnPause').textContent = gamePaused ? '▶ 继续' : '⏯ 暂停';
            if (gamePaused) {
                stopMusic(); // 暂停时停止音乐
                draw();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
            } else {
                startMusic(); // 恢复时重新播放音乐
            }
        }

        // ============ 排行榜渲染 ============
        function renderLeaderboard() {
            if (leaderboard.length === 0) {
                leaderboardBody.innerHTML = '<div class="no-records">📭 暂无记录，快来玩一局吧！</div>';
                return;
            }
            let html = `<table class="leaderboard-table">
                <thead><tr><th>排名</th><th>分数</th><th>难度</th><th>状态</th><th>时间</th></tr></thead><tbody>`;
            leaderboard.forEach((r, i) => {
                let rankClass = '';
                let rankIcon = (i + 1);
                if (i === 0) { rankClass = 'rank-1'; rankIcon = '🥇'; }
                else if (i === 1) { rankClass = 'rank-2'; rankIcon = '🥈'; }
                else if (i === 2) { rankClass = 'rank-3'; rankIcon = '🥉'; }
                html += `<tr>
                    <td class="${rankClass}">${rankIcon}</td>
                    <td style="font-weight:700;">${r.score}</td>
                    <td><span class="diff-tag ${r.difficulty}">${r.difficultyName}</span></td>
                    <td>${r.won ? '✅ 通关' : '—'}</td>
                    <td style="font-size:11px;color:#888;">${r.date}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            leaderboardBody.innerHTML = html;
        }

        function showLeaderboard() {
            renderLeaderboard();
            leaderboardOverlay.classList.remove('hidden');
        }

        function hideLeaderboard() {
            leaderboardOverlay.classList.add('hidden');
        }

        // ============ 事件绑定 ============

        // 开始页面 - 点击模式卡片
        document.querySelectorAll('.mode-card').forEach(card => {

        // 点击排行榜背景关闭

        gameOverOverlay.addEventListener('click', (e) => {

                gameOverOverlay.classList.add('hidden');
            }
        });

        // ============ 方向控制 ============
        function setDirection(dx, dy) {
            if (!gameRunning || gamePaused) return;
            if (dx === -direction.x && dy === -direction.y) return;
            if (dx === 0 && dy === 0) return;
            nextDirection = { x: dx, y: dy };
            sfxTurn();
        }

        // 按钮控制
        document.getElementById('btnUp').addEventListener('pointerdown', (e) => { e.preventDefault(); setDirection(0, -1); });
        document.getElementById('btnDown').addEventListener('pointerdown', (e) => { e.preventDefault(); setDirection(0, 1); });
        document.getElementById('btnLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); setDirection(-1, 0); });
        document.getElementById('btnRight').addEventListener('pointerdown', (e) => { e.preventDefault(); setDirection(1, 0); });

        // 触摸滑动控制
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!touchStartX) return;
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 20) return;
            if (absDx > absDy) {
                setDirection(dx > 0 ? 1 : -1, 0);
            } else {
                setDirection(0, dy > 0 ? 1 : -1);
            }
            touchStartX = 0;
            touchStartY = 0;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault(); setDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault(); setDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault(); setDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D':

        document.getElementById('btnHomeMusic').textContent = musicEnabled ? '🔊 音乐' : '🔇 音乐';

        // 防止双击缩放

        });

        // ============ 绘制 ============
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 网格背景
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 蛇尾拖影
            for (let i = 0; i < trailPositions.length; i++) {
                const t = trailPositions[i];
                const alpha = (i / trailPositions.length) * 0.15;
                ctx.fillStyle = `rgba(99, 102, 241, ${alpha})`;
                ctx.beginPath();
                ctx.roundRect(
                    t.x * CELL_SIZE + 2,
                    t.y * CELL_SIZE + 2,
                    CELL_SIZE - 4,
                    CELL_SIZE - 4,
                    CELL_SIZE * 0.3
                );
                ctx.fill();
            }

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const pad = i === 0 ? 1 : 2;

                const ratio = i / Math.max(snake.length - 1, 1);
                const r = Math.floor(99 + ratio * 40);
                const g = Math.floor(102 + ratio * 60);
                const b = Math.floor(241 - ratio * 100);
                ctx.fillStyle = `rgb(${r},${g},${b})`;

                if (i === 0) {
                    ctx.beginPath();
                    ctx.roundRect(x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, CELL_SIZE * 0.35);
                    ctx.fill();

                    // 眼睛
                    ctx.fillStyle = '#fff';
                    const eyeSize = CELL_SIZE * 0.22;
                    let eye1X, eye1Y, eye2X, eye2Y;
                    const cx = x + CELL_SIZE / 2;
                    const cy = y + CELL_SIZE / 2;
                    const offset = CELL_SIZE * 0.2;

                    if (direction.x === 1) {
                        eye1X = cx + offset; eye1Y = cy - offset;
                        eye2X = cx + offset; eye2Y = cy + offset;
                    } else if (direction.x === -1) {
                        eye1X = cx - offset; eye1Y = cy - offset;
                        eye2X = cx - offset; eye2Y = cy + offset;
                    } else if (direction.y === -1) {
                        eye1X = cx - offset; eye1Y = cy - offset;
                        eye2X = cx + offset; eye2Y = cy - offset;
                    } else {
                        eye1X = cx - offset; eye1Y = cy + offset;
                        eye2X = cx + offset; eye2Y = cy + offset;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.roundRect(x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, CELL_SIZE * 0.3);
                    ctx.fill();
                }
            }

            // 绘制食物
            if (food) {
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                const foodRadius = CELL_SIZE * 0.4;

                const glowGrad = ctx.createRadialGradient(fx, fy, foodRadius * 0.3, fx, fy, foodRadius * 1.5);
                glowGrad.addColorStop(0, 'rgba(255,107,107,0.4)');
                glowGrad.addColorStop(1, 'rgba(255,107,107,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(fx, fy, foodRadius * 1.5, 0, Math.PI * 2);
                ctx.fill();

                const foodGrad = ctx.createRadialGradient(fx - foodRadius * 0.3, fy - foodRadius * 0.3, foodRadius * 0.1, fx, fy, foodRadius);
                foodGrad.addColorStop(0, '#ff9a9e');
                foodGrad.addColorStop(0.7, '#ff4757');
                foodGrad.addColorStop(1, '#c0392b');
                ctx.fillStyle = foodGrad;
                ctx.beginPath();
                ctx.arc(fx, fy, foodRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(fx - foodRadius * 0.25, fy - foodRadius * 0.3, foodRadius * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }

            drawParticles();
        }

        console.log('🐍 贪吃蛇游戏已就绪！');
        console.log('   首页选择难度 → 进入游戏 → 查看排行榜');

        // 首次用户交互时解锁音频（解决浏览器自动播放限制）
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                const ctx = getAudioCtx();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                // 播放一个静音来解锁
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.001);
                audioUnlocked = true;
                console.log('🔓 音频已解锁');
            } catch(e) {}
        }
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });

        // 注册 Service Worker (PWA离线缓存)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Service Worker 已注册'))
                .catch(err => console.log('Service Worker 注册失败:', err));
        }
    </script>
